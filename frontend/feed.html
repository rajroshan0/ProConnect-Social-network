<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProConnect — Feed</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #111;
        }

        /* ===== NAV  */
        nav {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .nav-logo {
            font-size: 22px;
            font-weight: 800;
            color: #0a66c2;
            text-decoration: none;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .nav-logo span { color: #00a0dc; }

        .nav-search {
            flex: 1;
            max-width: 280px;
            position: relative;
        }

        .nav-search input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1.5px solid #e5e7eb;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            background: #f0f2f5;
            transition: all .2s;
        }

        .nav-search input:focus {
            border-color: #0a66c2;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(10,102,194,0.08);
        }

        .nav-search .search-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 14px;
            pointer-events: none;
        }

        .search-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-height: 320px;
            overflow-y: auto;
            display: none;
            z-index: 200;
        }

        .search-results.open { display: block; }

        .search-result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 1px solid #f3f4f6;
            gap: 10px;
        }

        .search-result-item:last-child { border-bottom: none; }

        .search-result-info { flex: 1; min-width: 0; }

        .search-result-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-result-title { font-size: 11px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn-connect {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid #0a66c2;
            color: #0a66c2;
            background: #fff;
            white-space: nowrap;
            transition: all .15s;
            flex-shrink: 0;
        }

        .btn-connect:hover { background: #0a66c2; color: #fff; }
        .btn-connect.pending { border-color: #aaa; color: #888; cursor: default; }
        .btn-connect.connected { border-color: #067700; color: #067700; cursor: default; }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }

        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 14px;
            text-decoration: none;
            color: #555;
            font-size: 11px;
            border-radius: 8px;
            transition: color .15s, background .15s;
            position: relative;
        }

        .nav-link:hover { color: #0a66c2; background: #f0f6ff; }

        .nav-link .icon { font-size: 18px; margin-bottom: 2px; }

        .notif-badge {
            position: absolute;
            top: 2px;
            right: 8px;
            background: #c00;
            color: #fff;
            border-radius: 10px;
            font-size: 10px;
            padding: 1px 5px;
            font-weight: 700;
            min-width: 16px;
            text-align: center;
        }

        .nav-btn-logout {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1.5px solid #0a66c2;
            color: #0a66c2;
            font-size: 13px;
            font-weight: 600;
            background: none;
            cursor: pointer;
            margin-left: 8px;
            transition: all .15s;
        }

        .nav-btn-logout:hover { background: #0a66c2; color: #fff; }

        /* ===== LAYOUT ===== */
        .page-wrap {
            max-width: 1080px;
            margin: 24px auto;
            padding: 0 16px;
            display: grid;
            grid-template-columns: 240px 1fr 280px;
            gap: 20px;
            align-items: start;
        }

        /* ===== SIDEBAR LEFT — Profile Summary ===== */
        .sidebar-left {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .profile-card-banner {
            height: 60px;
            background: linear-gradient(135deg, #0a66c2, #00a0dc);
        }

        .profile-card-body {
            padding: 12px 16px 16px;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #0a66c2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            margin-top: -36px;
            margin-bottom: 8px;
            border: 3px solid #fff;
        }

        .profile-card-name {
            font-weight: 700;
            font-size: 15px;
            color: #111;
        }

        .profile-card-title {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .profile-card-link {
            display: block;
            margin-top: 12px;
            font-size: 13px;
            color: #0a66c2;
            text-decoration: none;
            font-weight: 600;
        }

        .profile-card-link:hover { text-decoration: underline; }

        /* ===== MAIN FEED ===== */
        .main-feed { display: flex; flex-direction: column; gap: 16px; }

        .compose-card { padding: 16px; }

        .compose-row { display: flex; gap: 10px; align-items: center; }

        .compose-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #0a66c2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .compose-input {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid #d0d5dd;
            border-radius: 24px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            background: #f9fafb;
            color: #333;
            resize: none;
            transition: border-color .2s;
        }

        .compose-input:focus {
            border-color: #0a66c2;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(10,102,194,0.08);
            cursor: text;
        }

        .compose-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f2f5;
        }

        .btn-post {
            margin-left: auto;
            padding: 8px 22px;
            background: #0a66c2;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }

        .btn-post:hover { background: #004182; }

        /* ===== POST CARD ===== */
        .post-card { padding: 20px; }

        .post-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #0a66c2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .post-author-name { font-weight: 700; font-size: 14px; }
        .post-author-title { font-size: 12px; color: #666; }
        .post-time { font-size: 11px; color: #999; margin-top: 2px; }

        .post-content {
            font-size: 14px;
            color: #222;
            line-height: 1.6;
            margin-bottom: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post-footer {
            display: flex;
            gap: 6px;
            padding-top: 12px;
            border-top: 1px solid #f0f2f5;
        }

        .btn-small {
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            background: #fff;
            color: #555;
            transition: all .15s;
        }

        .btn-small:hover { background: #f0f2f5; }
        .btn-delete { color: #c00; border-color: #fca5a5; }
        .btn-delete:hover { background: #fff0f0; }

        /* ===== SIDEBAR RIGHT — Connection Requests ===== */
        .sidebar-right { display: flex; flex-direction: column; gap: 12px; }

        .sidebar-title { font-size: 15px; font-weight: 700; padding: 16px 16px 0; color: #111; }

        .request-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid #f3f4f6;
        }

        .request-item:last-child { border-bottom: none; }

        .req-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #0a66c2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .req-info { flex: 1; min-width: 0; }
        .req-name { font-weight: 600; font-size: 13px; }
        .req-title { font-size: 11px; color: #666; }
        .req-actions { display: flex; gap: 6px; margin-top: 6px; }

        .btn-accept {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            border: 1.5px solid #067700;
            color: #067700;
            background: #fff;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-accept:hover { background: #067700; color: #fff; }

        .btn-ignore {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            border: 1.5px solid #aaa;
            color: #888;
            background: #fff;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-ignore:hover { background: #f3f4f6; }

        .empty-state { text-align: center; padding: 20px 16px; font-size: 13px; color: #888; }

        .msg-bar { font-size: 13px; margin-top: 4px; padding: 8px 12px; border-radius: 6px; display: none; }
        .msg-bar.error   { display: block; color: #c00; background: #fff0f0; }
        .msg-bar.success { display: block; color: #067700; background: #f0fff0; }

        @media (max-width: 900px) {
            .page-wrap { grid-template-columns: 1fr; }
            .sidebar-left, .sidebar-right { display: none; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <a href="feed.html" class="nav-logo">Pro<span>Connect</span></a>

    <div class="nav-search">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search people…" autocomplete="off"
               oninput="onSearchInput()" onfocus="onSearchFocus()" onblur="onSearchBlur()">
        <div class="search-results" id="search-results"></div>
    </div>

    <div class="nav-links">
        <a href="feed.html" class="nav-link">
            <span class="icon">🏠</span>Home
        </a>
        <a href="messages.html" class="nav-link">
            <span class="icon">💬</span>Messages
        </a>
        <a href="profile.html" class="nav-link">
            <span class="icon">👤</span>Profile
        </a>
    </div>

    <button class="nav-btn-logout" onclick="logout()">Logout</button>
</nav>

<div class="page-wrap">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar-left">
        <div class="card">
            <div class="profile-card-banner"></div>
            <div class="profile-card-body">
                <div class="profile-avatar" id="sidebar-avatar">?</div>
                <div class="profile-card-name" id="sidebar-name">Loading…</div>
                <div class="profile-card-title" id="sidebar-title"></div>
                <a href="profile.html" class="profile-card-link">View my profile →</a>
            </div>
        </div>
    </div>

    <!-- MAIN FEED -->
    <div class="main-feed">

        <!-- COMPOSE -->
        <div class="card compose-card">
            <div class="compose-row">
                <div class="compose-avatar" id="compose-avatar">?</div>
                <textarea class="compose-input" id="post-content"
                    placeholder="What's on your mind?" rows="3"></textarea>
            </div>
            <div class="compose-actions">
                <button class="btn-post" onclick="createPost()">Post</button>
            </div>
            <p class="msg-bar" id="post-msg"></p>
        </div>

        <!-- POSTS -->
        <div id="feed-list">
            <div class="empty-state">Loading feed…</div>
        </div>

    </div>

    <!-- RIGHT SIDEBAR — Connection Requests -->
    <div class="sidebar-right">
        <div class="card" id="requests-card">
            <div class="sidebar-title">Pending Requests</div>
            <div id="requests-list">
                <div class="empty-state">Loading…</div>
            </div>
        </div>
    </div>

</div>

<script>
    // ---- Auth guard ----
    const token      = localStorage.getItem('token');
    const user       = JSON.parse(localStorage.getItem('user') || '{}');
    const profile_id = user.id;

    if (!token) window.location.href = 'login.html';

    const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

    // ---- My connections state (for search badges) ----
    let myConnections = []; // array of connection objects

    // ---- Init sidebar profile ----
    function initSidebar() {
        const initials = (user.name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
        document.getElementById('sidebar-avatar').textContent = initials;
        document.getElementById('compose-avatar').textContent = initials;
        document.getElementById('sidebar-name').textContent = user.name || '';
        document.getElementById('sidebar-title').textContent = user.job_title || '';
    }

    // ---- Load connections (for sidebar + search) ----
    async function loadConnections() {
        try {
            const res = await fetch(`http://localhost:3000/api/connections?profile_id=${profile_id}`);
            myConnections = await res.json();
            renderPendingRequests();
        } catch (e) { /* silent */ }
    }

    function getConnectionStatus(otherId) {
        const c = myConnections.find(c =>
            String(c.from_profile_id) === String(otherId) ||
            String(c.to_profile_id)   === String(otherId)
        );
        if (!c) return null;
        return c;
    }

    // ---- Render pending requests (incoming) ----
    function renderPendingRequests() {
        const incoming = myConnections.filter(c =>
            String(c.to_profile_id) === String(profile_id) && c.status === 'pending'
        );

        const list = document.getElementById('requests-list');

        if (incoming.length === 0) {
            list.innerHTML = '<div class="empty-state">No pending requests</div>';
            return;
        }

        list.innerHTML = incoming.map(c => `
            <div class="request-item" id="req-${c.id}">
                <div class="req-avatar">${initials(c.from_name)}</div>
                <div class="req-info">
                    <div class="req-name">${c.from_name}</div>
                    <div class="req-actions">
                        <button class="btn-accept" onclick="respondRequest(${c.id}, 'accepted')">Accept</button>
                        <button class="btn-ignore" onclick="respondRequest(${c.id}, 'rejected')">Ignore</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function respondRequest(connId, status) {
        try {
            const res = await fetch(`http://localhost:3000/api/connections/${connId}`, {
                method: 'PUT', headers, body: JSON.stringify({ status })
            });
            if (res.ok) {
                document.getElementById(`req-${connId}`)?.remove();
                loadConnections();
            }
        } catch (e) { /* silent */ }
    }

    // ---- Load feed ----
    async function loadFeed() {
        const list = document.getElementById('feed-list');
        try {
            const res   = await fetch('http://localhost:3000/api/posts');
            const posts = await res.json();

            if (!posts.length) {
                list.innerHTML = '<div class="empty-state">No posts yet. Be the first!</div>';
                return;
            }

            list.innerHTML = posts.map(p => `
                <div class="card post-card" id="post-${p.id}">
                    <div class="post-header">
                        <div class="post-avatar">${initials(p.author_name)}</div>
                        <div>
                            <div class="post-author-name">${p.author_name}</div>
                            <div class="post-author-title">${p.author_job_title || 'ProConnect Member'}</div>
                            <div class="post-time">${formatDate(p.created_at)}</div>
                        </div>
                    </div>
                    <div class="post-content">${escapeHtml(p.content)}</div>
                    <div class="post-footer">
                        ${p.author_id !== profile_id ? `
                            <button class="btn-small" onclick="sendConnectionFromFeed(${p.author_id}, this)">
                                🔗 Connect
                            </button>
                            <button class="btn-small" onclick="chatWith(${p.author_id})">
                                💬 Message
                            </button>
                        ` : `
                            <button class="btn-small btn-delete" onclick="deletePost(${p.id})">Delete</button>
                        `}
                    </div>
                </div>
            `).join('');

        } catch (err) {
            list.innerHTML = '<div class="empty-state" style="color:#c00">Could not load posts.</div>';
        }
    }

    function chatWith(userId) {
        window.location.href = `messages.html?with=${userId}`;
    }

    async function sendConnectionFromFeed(toId, btn) {
        btn.disabled = true;
        try {
            const res = await fetch('http://localhost:3000/api/connections', {
                method: 'POST', headers,
                body: JSON.stringify({ from_profile_id: profile_id, to_profile_id: toId })
            });
            const data = await res.json();
            if (res.ok || res.status === 409) {
                btn.textContent = '✓ Request Sent';
                btn.style.opacity = '0.6';
            } else {
                btn.disabled = false;
            }
        } catch (e) { btn.disabled = false; }
    }

    // ---- Create post ----
    async function createPost() {
        const content = document.getElementById('post-content').value.trim();
        const msg     = document.getElementById('post-msg');

        if (!content) {
            showMsg(msg, 'error', 'Write something first.');
            return;
        }

        try {
            const res = await fetch('http://localhost:3000/api/posts', {
                method: 'POST', headers,
                body: JSON.stringify({ content, posted_by_profile_id: profile_id })
            });
            const data = await res.json();

            if (!res.ok) { showMsg(msg, 'error', data.error); return; }

            document.getElementById('post-content').value = '';
            showMsg(msg, 'success', 'Posted!');
            loadFeed();
        } catch (e) { showMsg(msg, 'error', 'Server error.'); }
    }

    async function deletePost(postId) {
        if (!confirm('Delete this post?')) return;
        try {
            const res = await fetch(`http://localhost:3000/api/posts/${postId}`, { method: 'DELETE', headers });
            if (res.ok) document.getElementById(`post-${postId}`)?.remove();
        } catch (e) { alert('Could not delete.'); }
    }

    // ---- Search ----
    let searchTimer;

    function onSearchInput() {
        clearTimeout(searchTimer);
        const q = document.getElementById('search-input').value.trim();
        if (!q) { closeSearch(); return; }
        searchTimer = setTimeout(() => doSearch(q), 300);
    }

    function onSearchFocus() {
        const q = document.getElementById('search-input').value.trim();
        if (q) doSearch(q);
    }

    function onSearchBlur() {
        // delay to allow click on result
        setTimeout(closeSearch, 200);
    }

    function closeSearch() {
        document.getElementById('search-results').classList.remove('open');
    }

    async function doSearch(q) {
        try {
            const res     = await fetch(`http://localhost:3000/api/profiles?q=${encodeURIComponent(q)}`);
            const results = await res.json();

            const box = document.getElementById('search-results');

            const filtered = results.filter(p => p.id !== profile_id).slice(0, 8);

            if (!filtered.length) {
                box.innerHTML = '<div style="padding:14px;font-size:13px;color:#888;text-align:center">No users found</div>';
            } else {
                box.innerHTML = filtered.map(p => {
                    const conn = getConnectionStatus(p.id);
                    let btnHtml = '';
                    if (!conn) {
                        btnHtml = `<button class="btn-connect" onclick="connectFromSearch(${p.id}, this)">Connect</button>`;
                    } else if (conn.status === 'pending') {
                        btnHtml = `<button class="btn-connect pending">Pending</button>`;
                    } else if (conn.status === 'accepted') {
                        btnHtml = `<button class="btn-connect connected">Connected</button>`;
                    }
                    return `
                        <div class="search-result-item">
                            <div style="width:32px;height:32px;border-radius:50%;background:#0a66c2;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0">
                                ${initials(p.name)}
                            </div>
                            <div class="search-result-info">
                                <div class="search-result-name">${p.name}</div>
                                <div class="search-result-title">${p.job_title || p.company || 'ProConnect Member'}</div>
                            </div>
                            ${btnHtml}
                        </div>`;
                }).join('');
            }

            box.classList.add('open');
        } catch (e) { /* silent */ }
    }

    async function connectFromSearch(toId, btn) {
        btn.disabled = true;
        try {
            const res = await fetch('http://localhost:3000/api/connections', {
                method: 'POST', headers,
                body: JSON.stringify({ from_profile_id: profile_id, to_profile_id: toId })
            });
            if (res.ok || res.status === 409) {
                btn.textContent = 'Pending';
                btn.className = 'btn-connect pending';
                loadConnections();
            } else {
                btn.disabled = false;
            }
        } catch (e) { btn.disabled = false; }
    }

    // ---- Helpers ----
    function initials(name) {
        return (name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    }

    function formatDate(d) {
        return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(t) {
        return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showMsg(el, type, text) {
        el.className = 'msg-bar ' + type;
        el.textContent = text;
        setTimeout(() => { el.className = 'msg-bar'; el.textContent = ''; }, 3000);
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    // ---- Init ----
    initSidebar();
    loadConnections();
    loadFeed();
</script>
