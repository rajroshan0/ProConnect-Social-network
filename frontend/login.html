<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProConnect — Sign In</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #0a66c2;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }

        .logo span { color: #00a0dc; }

        .card {
            background: #fff;
            padding: 36px 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        h2 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 6px; }
        .sub { color: #666; font-size: 14px; margin-bottom: 28px; }

        label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }

        input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            outline: none;
            transition: border-color .2s;
            color: #111;
        }

        input:focus { border-color: #0a66c2; box-shadow: 0 0 0 3px rgba(10,102,194,0.1); }

        button.primary {
            width: 100%;
            padding: 12px;
            background: #0a66c2;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }

        button.primary:hover { background: #004182; }

        .msg { margin-top: 14px; font-size: 13px; text-align: center; padding: 10px; border-radius: 6px; }
        .msg.error   { color: #c00; background: #fff0f0; }
        .msg.success { color: #067700; background: #f0fff0; }
        .msg:empty   { display: none; }

        .divider { text-align: center; margin: 20px 0; color: #aaa; font-size: 13px; position: relative; }
        .divider::before, .divider::after {
            content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #e5e7eb;
        }
        .divider::before { left: 0; } .divider::after { right: 0; }

        .footer { margin-top: 20px; font-size: 13px; text-align: center; color: #555; }
        .footer a { color: #0a66c2; text-decoration: none; font-weight: 600; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="logo">Pro<span>Connect</span></div>

<div class="card">
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your account</p>

    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

    <button class="primary" onclick="login()">Sign In</button>

    <p class="msg" id="msg"></p>

    <div class="divider">or</div>

    <div class="footer">
        New to ProConnect? <a href="register.html">Create account</a>
    </div>
</div>

<script>
    if (localStorage.getItem('token')) window.location.href = 'feed.html';

    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const msg      = document.getElementById('msg');

        if (!email || !password) {
            msg.className = 'msg error';
            msg.textContent = 'Please enter your email and password.';
            return;
        }

        try {
            const res  = await fetch('https://proconnect-api.onrender.com/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (!res.ok) {
                msg.className = 'msg error';
                msg.textContent = data.error || 'Login failed.';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('user',  JSON.stringify(data.user));
            localStorage.setItem('profile_id', data.user.id);

            window.location.href = data.user.role === 'admin' ? 'admin.html' : 'feed.html';

        } catch (err) {
            msg.className = 'msg error';
            msg.textContent = 'Cannot reach server. Is it running?';
        }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
