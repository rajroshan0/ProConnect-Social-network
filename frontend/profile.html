<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProConnect — My Profile</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #111;
        }

        /* ===== NAV ===== */
        nav {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .nav-logo {
            font-size: 22px;
            font-weight: 800;
            color: #0a66c2;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-logo span { color: #00a0dc; }

        .nav-links { display: flex; align-items: center; gap: 4px; margin-left: auto; }

        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 14px;
            text-decoration: none;
            color: #555;
            font-size: 11px;
            border-radius: 8px;
            transition: color .15s, background .15s;
        }

        .nav-link:hover { color: #0a66c2; background: #f0f6ff; }
        .nav-link .icon { font-size: 18px; margin-bottom: 2px; }

        .nav-btn-logout {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1.5px solid #0a66c2;
            color: #0a66c2;
            font-size: 13px;
            font-weight: 600;
            background: none;
            cursor: pointer;
            margin-left: 8px;
            transition: all .15s;
        }

        .nav-btn-logout:hover { background: #0a66c2; color: #fff; }

        /* ===== LAYOUT ===== */
        .page-wrap {
            max-width: 820px;
            margin: 24px auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ===== CARDS ===== */
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }

        .card-body { padding: 24px; }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* ===== PROFILE HEADER ===== */
        .profile-banner {
            height: 80px;
            background: linear-gradient(135deg, #0a66c2, #00a0dc);
        }

        .profile-header-body { padding: 16px 24px 24px; }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #0a66c2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            margin-top: -48px;
            margin-bottom: 10px;
            border: 4px solid #fff;
        }

        .profile-name { font-size: 22px; font-weight: 700; }
        .profile-title { font-size: 14px; color: #555; margin-top: 2px; }
        .profile-company { font-size: 13px; color: #777; margin-top: 4px; }
        .profile-email { font-size: 13px; color: #888; margin-top: 2px; }

        .profile-actions { display: flex; gap: 10px; margin-top: 16px; }

        .btn { padding: 9px 22px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
        .btn-primary { background: #0a66c2; color: #fff; }
        .btn-primary:hover { background: #004182; }
        .btn-secondary { background: #fff; color: #0a66c2; border: 1.5px solid #0a66c2; }
        .btn-secondary:hover { background: #f0f6ff; }
        .btn-danger { background: #fff; color: #c00; border: 1.5px solid #fca5a5; }
        .btn-danger:hover { background: #fff0f0; }

        /* ===== EDIT FORM ===== */
        .edit-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #f0f2f5; display: none; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }
        .form-group input:focus { border-color: #0a66c2; box-shadow: 0 0 0 3px rgba(10,102,194,0.08); }

        .form-actions { display: flex; gap: 10px; margin-top: 4px; }

        /* ===== MSG ===== */
        .msg-bar { font-size: 13px; margin-top: 10px; padding: 10px; border-radius: 6px; display: none; }
        .msg-bar.error   { display: block; color: #c00; background: #fff0f0; }
        .msg-bar.success { display: block; color: #067700; background: #f0fff0; }

        /* ===== SKILLS ===== */
        .skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

        .skill-tag {
            background: #f0f2f5;
            border: 1.5px solid #e5e7eb;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .skill-tag button {
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            font-size: 14px;
            padding: 0;
            line-height: 1;
            transition: color .15s;
        }

        .skill-tag button:hover { color: #c00; }

        .add-skill-row { display: flex; gap: 10px; }

        .add-skill-row select {
            flex: 1;
            padding: 9px 12px;
            border: 1.5px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        /* ===== CONNECTIONS ===== */
        .connections-list { display: flex; flex-direction: column; gap: 0; }

        .conn-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid #f0f2f5;
        }

        .conn-item:last-child { border-bottom: none; }

        .conn-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #0a66c2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .conn-info { flex: 1; min-width: 0; }
        .conn-name { font-weight: 600; font-size: 14px; }
        .conn-title { font-size: 12px; color: #666; margin-top: 2px; }

        .conn-actions { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-msg {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1.5px solid #0a66c2;
            color: #0a66c2;
            font-size: 12px;
            font-weight: 600;
            background: #fff;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-msg:hover { background: #0a66c2; color: #fff; }

        .btn-remove {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1.5px solid #fca5a5;
            color: #c00;
            font-size: 12px;
            font-weight: 600;
            background: #fff;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-remove:hover { background: #fff0f0; }

        /* Pending requests in connections panel */
        .pending-badge {
            background: #0a66c2;
            color: #fff;
            border-radius: 10px;
            font-size: 11px;
            padding: 2px 8px;
            font-weight: 700;
        }

        .conn-status {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .conn-status.pending  { background: #fef9c3; color: #92400e; }
        .conn-status.accepted { background: #dcfce7; color: #15803d; }

        .btn-accept-sm {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1.5px solid #067700;
            color: #067700;
            font-size: 11px;
            font-weight: 600;
            background: #fff;
            cursor: pointer;
        }

        .btn-accept-sm:hover { background: #067700; color: #fff; }

        .btn-ignore-sm {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1.5px solid #ccc;
            color: #888;
            font-size: 11px;
            font-weight: 600;
            background: #fff;
            cursor: pointer;
        }

        .btn-ignore-sm:hover { background: #f3f4f6; }

        .empty-state { text-align: center; padding: 20px 0; font-size: 13px; color: #aaa; }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #f0f2f5;
            margin-bottom: 16px;
        }

        .tab {
            padding: 8px 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color .15s;
        }

        .tab.active { color: #0a66c2; border-bottom-color: #0a66c2; }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <a href="feed.html" class="nav-logo">Pro<span>Connect</span></a>

    <div class="nav-links">
        <a href="feed.html"    class="nav-link"><span class="icon">🏠</span>Home</a>
        <a href="messages.html" class="nav-link"><span class="icon">💬</span>Messages</a>
        <a href="profile.html" class="nav-link"><span class="icon">👤</span>Profile</a>
    </div>

    <button class="nav-btn-logout" onclick="logout()">Logout</button>
</nav>

<div class="page-wrap">

    <!-- PROFILE HEADER -->
    <div class="card">
        <div class="profile-banner"></div>
        <div class="profile-header-body">
            <div class="profile-avatar" id="avatar">?</div>
            <div class="profile-name"    id="display-name">—</div>
            <div class="profile-title"   id="display-job">—</div>
            <div class="profile-company" id="display-company"></div>
            <div class="profile-email"   id="display-email"></div>

            <div class="profile-actions">
                <button class="btn btn-primary" onclick="toggleEdit()">✏️ Edit Profile</button>
            </div>

            <!-- EDIT FORM -->
            <div class="edit-section" id="edit-section">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="edit-name" placeholder="Full Name">
                </div>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="edit-job" placeholder="e.g. Software Engineer">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="edit-company" placeholder="e.g. TechCorp">
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
                    <button class="btn btn-secondary" onclick="toggleEdit()">Cancel</button>
                </div>
                <div class="msg-bar" id="edit-msg"></div>
            </div>
        </div>
    </div>

    <!-- SKILLS -->
    <div class="card">
        <div class="card-body">
            <div class="card-title">Skills</div>
            <div class="skills-wrap" id="skills-list">
                <div class="empty-state">Loading skills…</div>
            </div>
            <div class="add-skill-row">
                <select id="skill-select">
                    <option value="">— select skill to add —</option>
                </select>
                <button class="btn btn-primary" onclick="addSkill()">Add</button>
            </div>
            <div class="msg-bar" id="skill-msg"></div>
        </div>
    </div>

    <!-- CONNECTIONS -->
    <div class="card">
        <div class="card-body">
            <div class="card-title">
                My Network
                <span class="pending-badge" id="pending-count" style="display:none">0</span>
            </div>

            <div class="tabs">
                <div class="tab active" id="tab-connected" onclick="switchConnTab('connected')">Connected</div>
                <div class="tab"        id="tab-pending"   onclick="switchConnTab('pending')">Pending</div>
                <div class="tab"        id="tab-sent"      onclick="switchConnTab('sent')">Sent</div>
            </div>

            <div class="connections-list" id="connections-list">
                <div class="empty-state">Loading…</div>
            </div>
            <div class="msg-bar" id="conn-msg"></div>
        </div>
    </div>

</div>

<script>
    // ---- Auth guard ----
    const token      = localStorage.getItem('token');
    const user       = JSON.parse(localStorage.getItem('user') || '{}');
    const profile_id = user.id;

    if (!token) window.location.href = 'login.html';

    const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

    let allConnections = [];
    let currentConnTab = 'connected';

    // ---- Load profile ----
    async function loadProfile() {
        try {
            const res  = await fetch(`https://proconnect-api.onrender.com/api/profiles/${profile_id}`);
            const data = await res.json();

            const init = (data.name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
            document.getElementById('avatar').textContent          = init;
            document.getElementById('display-name').textContent    = data.name      || '—';
            document.getElementById('display-job').textContent     = data.job_title || '';
            document.getElementById('display-company').textContent = data.company   || '';
            document.getElementById('display-email').textContent   = data.email     || '';

            // Prefill edit form
            document.getElementById('edit-name').value    = data.name      || '';
            document.getElementById('edit-job').value     = data.job_title || '';
            document.getElementById('edit-company').value = data.company   || '';

            renderSkills(data.skills || []);
        } catch (e) { /* silent */ }
    }

    // ---- Skills ----
    function renderSkills(skills) {
        const list = document.getElementById('skills-list');
        if (!skills.length) {
            list.innerHTML = '<div class="empty-state">No skills added yet.</div>';
            return;
        }
        list.innerHTML = skills.map(s => `
            <div class="skill-tag">
                ${s.name}
                <button onclick="removeSkill(${s.id})" title="Remove">✕</button>
            </div>
        `).join('');
    }

    async function loadAllSkills() {
        try {
            const res    = await fetch('https://proconnect-api.onrender.com/api/skills');
            const skills = await res.json();
            const select = document.getElementById('skill-select');
            skills.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.name;
                select.appendChild(opt);
            });
        } catch (e) { /* silent */ }
    }

    async function addSkill() {
        const skill_id = document.getElementById('skill-select').value;
        const msg      = document.getElementById('skill-msg');
        if (!skill_id) { showMsg(msg, 'error', 'Pick a skill first.'); return; }
        try {
            const res = await fetch(`https://proconnect-api.onrender.com/api/skills/profile/${profile_id}/skills`, {
                method: 'POST', headers, body: JSON.stringify({ skill_id })
            });
            const data = await res.json();
            if (!res.ok) { showMsg(msg, 'error', data.error); return; }
            showMsg(msg, 'success', 'Skill added!');
            loadProfile();
        } catch (e) { showMsg(msg, 'error', 'Server error.'); }
    }

    async function removeSkill(skillId) {
        const msg = document.getElementById('skill-msg');
        try {
            const res = await fetch(`https://proconnect-api.onrender.com/api/skills/profile/${profile_id}/skills/${skillId}`, {
                method: 'DELETE', headers
            });
            if (res.ok) { showMsg(msg, 'success', 'Skill removed.'); loadProfile(); }
        } catch (e) { showMsg(msg, 'error', 'Server error.'); }
    }

    // ---- Edit profile ----
    function toggleEdit() {
        const s = document.getElementById('edit-section');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
    }

    async function saveProfile() {
        const msg  = document.getElementById('edit-msg');
        const body = {
            name:      document.getElementById('edit-name').value.trim(),
            job_title: document.getElementById('edit-job').value.trim(),
            company:   document.getElementById('edit-company').value.trim()
        };

        try {
            const res = await fetch(`https://proconnect-api.onrender.com/api/profiles/${profile_id}`, {
                method: 'PUT', headers, body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!res.ok) { showMsg(msg, 'error', data.error); return; }
            showMsg(msg, 'success', 'Profile updated!');
            loadProfile();
            setTimeout(() => { document.getElementById('edit-section').style.display = 'none'; }, 1200);
        } catch (e) { showMsg(msg, 'error', 'Server error.'); }
    }

    // ---- Connections ----
    async function loadConnections() {
        try {
            const res = await fetch(`https://proconnect-api.onrender.com/api/connections?profile_id=${profile_id}`);
            allConnections = await res.json();

            // Update pending badge
            const incoming = allConnections.filter(c =>
                String(c.to_profile_id) === String(profile_id) && c.status === 'pending'
            );
            const badge = document.getElementById('pending-count');
            if (incoming.length) {
                badge.textContent = incoming.length;
                badge.style.display = 'inline';
                document.getElementById('tab-pending').textContent = `Pending (${incoming.length})`;
            } else {
                badge.style.display = 'none';
            }

            renderConnections(currentConnTab);
        } catch (e) { /* silent */ }
    }

    function switchConnTab(tab) {
        currentConnTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        renderConnections(tab);
    }

    function renderConnections(tab) {
        const list = document.getElementById('connections-list');
        let items  = [];

        if (tab === 'connected') {
            items = allConnections.filter(c => c.status === 'accepted');
        } else if (tab === 'pending') {
            // Incoming pending requests
            items = allConnections.filter(c =>
                String(c.to_profile_id) === String(profile_id) && c.status === 'pending'
            );
        } else if (tab === 'sent') {
            // Outgoing pending requests
            items = allConnections.filter(c =>
                String(c.from_profile_id) === String(profile_id) && c.status === 'pending'
            );
        }

        if (!items.length) {
            list.innerHTML = '<div class="empty-state">Nothing here yet.</div>';
            return;
        }

        list.innerHTML = items.map(c => {
            // Determine the "other" person
            const isSender = String(c.from_profile_id) === String(profile_id);
            const otherId   = isSender ? c.to_profile_id   : c.from_profile_id;
            const otherName = isSender ? c.to_name         : c.from_name;

            if (tab === 'connected') {
                return `
                    <div class="conn-item" id="conn-${c.id}">
                        <div class="conn-avatar">${initials(otherName)}</div>
                        <div class="conn-info">
                            <div class="conn-name">${otherName}</div>
                            <div class="conn-title">Connected</div>
                        </div>
                        <div class="conn-actions">
                            <button class="btn-msg" onclick="chatWith(${otherId})">💬 Message</button>
                            <button class="btn-remove" onclick="removeConnection(${c.id})">Remove</button>
                        </div>
                    </div>`;
            } else if (tab === 'pending') {
                return `
                    <div class="conn-item" id="conn-${c.id}">
                        <div class="conn-avatar">${initials(otherName)}</div>
                        <div class="conn-info">
                            <div class="conn-name">${otherName}</div>
                            <div class="conn-title" style="color:#92400e">wants to connect</div>
                        </div>
                        <div class="conn-actions">
                            <button class="btn-accept-sm" onclick="respondConn(${c.id}, 'accepted')">Accept</button>
                            <button class="btn-ignore-sm" onclick="respondConn(${c.id}, 'rejected')">Ignore</button>
                        </div>
                    </div>`;
            } else {
                return `
                    <div class="conn-item" id="conn-${c.id}">
                        <div class="conn-avatar">${initials(otherName)}</div>
                        <div class="conn-info">
                            <div class="conn-name">${otherName}</div>
                            <div class="conn-title" style="color:#888">Request sent · Pending</div>
                        </div>
                        <div class="conn-actions">
                            <button class="btn-remove" onclick="removeConnection(${c.id})">Cancel</button>
                        </div>
                    </div>`;
            }
        }).join('');
    }

    async function respondConn(connId, status) {
        const msg = document.getElementById('conn-msg');
        try {
            const res = await fetch(`https://proconnect-api.onrender.com/api/connections/${connId}`, {
                method: 'PUT', headers, body: JSON.stringify({ status })
            });
            if (res.ok) {
                showMsg(msg, 'success', status === 'accepted' ? 'Connected!' : 'Request ignored.');
                loadConnections();
            }
        } catch (e) { showMsg(msg, 'error', 'Server error.'); }
    }

    async function removeConnection(connId) {
        if (!confirm('Remove this connection?')) return;
        const msg = document.getElementById('conn-msg');
        try {
            const res = await fetch(`https://proconnect-api.onrender.com/api/connections/${connId}`, { method: 'DELETE', headers });
            if (res.ok) {
                showMsg(msg, 'success', 'Removed.');
                loadConnections();
            }
        } catch (e) { showMsg(msg, 'error', 'Server error.'); }
    }

    function chatWith(userId) { window.location.href = `messages.html?with=${userId}`; }

    // ---- Helpers ----
    function initials(name) {
        return (name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    }

    function showMsg(el, type, text) {
        el.className = 'msg-bar ' + type;
        el.textContent = text;
        setTimeout(() => { el.className = 'msg-bar'; el.textContent = ''; }, 3000);
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    // ---- Init ----
    loadProfile();
    loadAllSkills();
    loadConnections();
</script>

</body>
</html>
